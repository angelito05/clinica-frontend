<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Médico | SistemaIA_Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/impresion.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: var(--clr-surface);">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i data-lucide="brain-circuit" color="var(--clr-accent)" stroke-width="1.5" width="28" height="28"
                    class="me-2"></i>
                <span class="font-semibold" style="color: var(--clr-dark);">SistemaIA_<span
                        class="text-accent">Salud</span></span>
            </a>

            <div class="d-flex align-items-center">
                <span class="me-3 font-body text-muted small" id="userNameDisplay">Cargando doctor...</span>
                <button class="btn btn-sm btn-outline-danger d-flex align-items-center gap-2 rounded-3"
                    onclick="cerrarSesion()">
                    <i data-lucide="log-out" stroke-width="1.5" width="16" height="16"></i>
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 1200px;">
        <div class="row g-4">

            <div class="col-12">
                <div class="card shadow-sm border-0 rounded-4" style="background-color: #FFFFFF;">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 style="color: #002D4C;" class="mb-0 d-flex align-items-center gap-2">
                                <i data-lucide="users" color="#00A693"></i> Mis Pacientes
                            </h4>
                            <button class="btn btn-brand rounded-3 d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#modalNuevoPaciente">
                                <i data-lucide="user-plus" width="18"></i> Registrar Nuevo Paciente
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light text-muted small">
                                    <tr>
                                        <th>Nombre Completo</th>
                                        <th>Fecha Nacimiento</th>
                                        <th>Sexo</th>
                                        <th>Teléfono</th>
                                        <th>Tipo Sangre</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-pacientes">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted py-4">Cargando pacientes...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal Nuevo Paciente -->
    <div class="modal fade" id="modalNuevoPaciente" tabindex="-1" aria-labelledby="modalNuevoPacienteLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title font-semibold" style="color: #002D4C;" id="modalNuevoPacienteLabel">Registrar Nuevo Paciente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-nuevo-paciente">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label small text-muted fw-bold">Nombre Completo</label>
                                <input type="text" class="form-control" id="paciente-nombre" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Fecha de Nacimiento</label>
                                <input type="date" class="form-control" id="paciente-fecha" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Sexo</label>
                                <select class="form-select" id="paciente-sexo" required>
                                    <option value="">Seleccione...</option>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Femenino">Femenino</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Teléfono</label>
                                <input type="tel" class="form-control" id="paciente-telefono">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="paciente-email">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Tipo de Sangre</label>
                                <select class="form-select" id="paciente-sangre">
                                    <option value="">Desconocido</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted fw-bold">Alergias (separadas por coma)</label>
                                <input type="text" class="form-control" id="paciente-alergias" placeholder="Ej. Penicilina, Nueces">
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="button" class="btn btn-light rounded-3 me-2" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-brand rounded-3">Guardar Paciente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();

        // Función rápida para recuperar el nombre del login
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre') || 'Dr. Usuario';
            document.getElementById('userNameDisplay').textContent = nombre;
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
