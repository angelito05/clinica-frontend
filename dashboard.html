<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Médico | SistemaIA_Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: var(--clr-surface);">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i data-lucide="brain-circuit" color="var(--clr-accent)" stroke-width="1.5" width="28" height="28"
                    class="me-2"></i>
                <span class="font-semibold" style="color: var(--clr-dark);">SistemaIA_<span
                        class="text-accent">Salud</span></span>
            </a>

            <div class="d-flex align-items-center">
                <span class="me-3 font-body text-muted small" id="userNameDisplay">Cargando doctor...</span>
                <button class="btn btn-sm btn-outline-danger d-flex align-items-center gap-2 rounded-3"
                    onclick="cerrarSesion()">
                    <i data-lucide="log-out" stroke-width="1.5" width="16" height="16"></i>
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 1200px;">
        <div class="row g-4">

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 h-100" style="background-color: var(--clr-surface);">
                    <div class="card-body p-4 text-center">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                            style="width: 80px; height: 80px; background-color: rgba(0, 166, 147, 0.1);">
                            <i data-lucide="mic" color="var(--clr-accent)" stroke-width="1.5" width="40"
                                height="40"></i>
                        </div>
                        <h4 class="font-semibold mb-2">Dictado de Receta</h4>
                        <p class="text-muted small mb-4">Usa la Inteligencia Artificial para estructurar tu diagnóstico
                            y medicamentos solo con tu voz.</p>

                        <button id="btnGrabar"
                            class="btn btn-primary w-100 py-3 rounded-3 shadow-sm d-flex justify-content-center align-items-center gap-2 text-white">
                            <i data-lucide="radio" stroke-width="1.5" width="20" height="20"></i>
                            <span id="btnGrabarTexto">Iniciar Grabación</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0 rounded-4 h-100" style="background-color: var(--clr-surface);">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="font-semibold mb-0 d-flex align-items-center gap-2">
                                <i data-lucide="clipboard-list" color="var(--clr-dark)" stroke-width="1.5" width="24"
                                    height="24"></i>
                                Actividad Reciente
                            </h5>
                            <button class="btn btn-sm btn-outline-primary rounded-3 d-flex align-items-center gap-2">
                                <i data-lucide="file-up" stroke-width="1.5" width="16" height="16"></i>
                                Subir PDF de Lab
                            </button>
                        </div>

                        <div id="listaRecetas" class="text-center py-5 text-muted">
                            <i data-lucide="inbox" color="var(--clr-placeholder)" stroke-width="1.5" width="48"
                                height="48" class="mb-3 opacity-50"></i>
                            <p class="mb-0">Aún no hay recetas generadas hoy.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // Función rápida para recuperar el nombre del login
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre') || 'Dr. Usuario';
            document.getElementById('userNameDisplay').textContent = nombre;
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
