<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Paciente | SistemaIA_Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .timeline {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 2rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e9ecef;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.85rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #00A693;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #00A693;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm" style="background-color: var(--clr-surface);">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i data-lucide="brain-circuit" color="var(--clr-accent)" stroke-width="1.5" width="28" height="28" class="me-2"></i>
                <span class="font-semibold" style="color: var(--clr-dark);">SistemaIA_<span class="text-accent">Salud</span></span>
            </a>

            <div class="d-flex align-items-center gap-3">
                <a href="dashboard.html" class="btn btn-sm btn-outline-secondary rounded-3 d-flex align-items-center gap-2">
                    <i data-lucide="arrow-left" width="16"></i> Volver al Dashboard
                </a>
                <span class="font-body text-muted small" id="userNameDisplay">Cargando doctor...</span>
            </div>
        </div>
    </nav>

    <style>
        .fab-button {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1050;
            box-shadow: 0 4px 15px rgba(0, 166, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 166, 147, 0.6);
        }
        .nav-pills .nav-link {
            color: #002D4C;
            font-weight: 500;
        }
        .nav-pills .nav-link.active, .nav-pills .show>.nav-link {
            color: #fff;
            background-color: var(--clr-brand);
        }
    </style>

    <div class="container mt-4 mb-5 pb-5" style="max-width: 1200px;">
        <div class="d-flex align-items-center mb-3">
            <h3 style="color: #002D4C;" class="mb-0">Expediente Clínico</h3>
        </div>

        <!-- Perfil Horizontal (Bento Header) -->
        <div class="card shadow-sm border-0 rounded-4 mb-4" style="background-color: #FFFFFF;">
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-md-auto text-center mb-3 mb-md-0">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light" style="width: 80px; height: 80px;">
                            <i data-lucide="user" color="#002D4C" width="40" height="40"></i>
                        </div>
                    </div>
                    <div class="col-md">
                        <h4 id="perfil-nombre" style="color: #002D4C;" class="mb-1">Cargando...</h4>
                        <p class="text-muted small mb-0" id="perfil-edad"></p>
                    </div>
                    <div class="col-md-auto d-flex flex-wrap gap-3 mt-3 mt-md-0 justify-content-md-end">
                        <div class="bg-light rounded-3 px-3 py-2 d-flex flex-column">
                            <span class="small text-muted fw-bold">Contacto</span>
                            <span class="small text-nowrap"><i data-lucide="phone" width="12" class="me-1"></i><span id="perfil-telefono">...</span></span>
                            <span class="small text-nowrap"><i data-lucide="mail" width="12" class="me-1"></i><span id="perfil-email">...</span></span>
                        </div>
                        <div class="bg-light rounded-3 px-3 py-2 d-flex flex-column text-center">
                            <span class="small text-muted fw-bold">Sangre</span>
                            <span id="perfil-sangre" class="badge bg-danger rounded-pill mt-1">...</span>
                        </div>
                        <div class="bg-light rounded-3 px-3 py-2 d-flex flex-column border border-warning" style="min-width: 150px; background-color: #fffaf0 !important;">
                            <span class="small text-warning-emphasis fw-bold"><i data-lucide="alert-triangle" width="14" class="me-1"></i>Alergias Críticas</span>
                            <div id="perfil-alergias" class="small mt-1 text-wrap text-danger fw-medium">...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navegación por Pestañas -->
        <ul class="nav nav-pills mb-4 gap-2" id="expediente-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill px-4" id="historial-tab" data-bs-toggle="pill" data-bs-target="#historial" type="button" role="tab" aria-controls="historial" aria-selected="true">
                    <i data-lucide="history" width="18" class="me-1"></i> Historial de Consultas
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill px-4" id="laboratorio-tab" data-bs-toggle="pill" data-bs-target="#laboratorio" type="button" role="tab" aria-controls="laboratorio" aria-selected="false">
                    <i data-lucide="microscope" width="18" class="me-1"></i> Laboratorio e Imágenes
                </button>
            </li>
        </ul>

        <!-- Contenido de las Pestañas -->
        <div class="tab-content" id="expediente-tabs-content">
            <!-- Pestaña Historial -->
            <div class="tab-pane fade show active" id="historial" role="tabpanel" aria-labelledby="historial-tab" tabindex="0">
                <div class="card shadow-sm border-0 rounded-4" style="background-color: #FFFFFF;">
                    <div class="card-body p-4">
                        <div id="timeline-consultas" class="timeline mt-2">
                            <p class="text-muted text-center" id="mensaje-timeline">Cargando consultas...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pestaña Laboratorio -->
            <div class="tab-pane fade" id="laboratorio" role="tabpanel" aria-labelledby="laboratorio-tab" tabindex="0">
                <div class="card shadow-sm border-0 rounded-4" style="background-color: #FFFFFF;">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle small mb-0">
                                <thead class="table-light text-muted">
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Tipo de Estudio</th>
                                        <th>Notas</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-estudios">
                                    <tr>
                                        <td colspan="4" class="text-center text-muted py-3" id="mensaje-estudios">Cargando estudios...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Botón Flotante Nueva Consulta (FAB) -->
    <button id="btn-nueva-consulta" class="btn rounded-pill d-flex align-items-center gap-2 px-4 py-3 fw-bold fab-button shadow-lg" style="font-size: 1.1rem; background-color: #00A693; color: white; border: none;">
        <i data-lucide="plus-circle" width="22" color="white"></i> Nueva Consulta
    </button>

    <!-- Modal Ver Receta (Opcional, para ver detalles de una consulta) -->
    <div class="modal fade" id="modalVerConsulta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title font-semibold" style="color: #002D4C;">Detalle de Consulta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2" id="detalle-consulta-body">
                    <!-- Contenido se inyecta dinámicamente -->
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Análisis IA -->
    <div class="modal fade" id="modalAnalisisIA" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title font-semibold d-flex align-items-center gap-2" style="color: #002D4C;">
                        <i data-lucide="sparkles" color="#00A693"></i> Análisis de IA (Gemini)
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3" id="analisis-ia-body">
                    <!-- Contenido del análisis de Gemini (Markdown a HTML) -->
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre') || 'Dr. Usuario';
            document.getElementById('userNameDisplay').textContent = nombre;
        });
    </script>
    <script src="js/api.js"></script>
    <script src="js/paciente.js"></script>
</body>
</html>
