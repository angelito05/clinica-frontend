<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SistemaIA_Salud por Cosenθ</title>

    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Montserrat:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8F9FA;
            color: #002D4C;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }

        .btn-brand {
            background-color: #004D7F;
            color: #FFFFFF;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-brand:hover {
            background-color: #00375b;
            color: #FFFFFF;
        }

        .form-control:focus {
            border-color: #00A693;
            box-shadow: 0 0 0 0.25rem rgba(0, 166, 147, 0.25);
        }

        /* Estilos para las Pestañas (Tabs) */
        .nav-pills .nav-link {
            color: #95A5A6;
            font-weight: 500;
            border-radius: 0.5rem;
        }

        .nav-pills .nav-link.active {
            background-color: rgba(0, 166, 147, 0.1);
            color: #00A693;
            font-weight: 600;
        }
    </style>
</head>

<body class="d-flex align-items-center py-5" style="min-height: 100vh;">

    <div class="container" style="max-width: 1200px;">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <div class="card shadow-sm border-0 rounded-4" style="background-color: #FFFFFF;">
                    <div class="card-body p-4 p-md-5">

                        <!-- Cabecera -->
                        <div class="text-center mb-4">
                            <h3 class="mb-1" style="color: #002D4C;">Crear Cuenta</h3>
                            <p class="text-muted small">Únete a SistemaIA_<span style="color: #00A693;">Salud</span></p>
                        </div>

                        <!-- Pestañas de Selección de Rol -->
                        <ul class="nav nav-pills nav-fill mb-4 p-1 rounded-3" style="background-color: #F8F9FA;"
                            id="rolTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active d-flex justify-content-center align-items-center gap-2"
                                    id="tab-doctor" data-rol="doctor" type="button" role="tab">
                                    <i data-lucide="stethoscope" stroke-width="1.5" width="18" height="18"></i> Médico
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link d-flex justify-content-center align-items-center gap-2"
                                    id="tab-laboratorio" data-rol="laboratorio" type="button" role="tab">
                                    <i data-lucide="microscope" stroke-width="1.5" width="18" height="18"></i>
                                    Laboratorio
                                </button>
                            </li>
                        </ul>

                        <!-- Formulario de Registro -->
                        <form id="registroForm">
                            <!-- Campo Oculto para guardar el rol seleccionado -->
                            <input type="hidden" id="rolInput" value="doctor">

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Nombre Completo / Responsable</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej. Dr. Juan Pérez"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Contraseña</label>
                                <input type="password" class="form-control" id="password"
                                    placeholder="Mínimo 6 caracteres" required minlength="6">
                            </div>

                            <!-- ZONA DINÁMICA: Cédula (Solo visible para Doctor) -->
                            <div class="mb-4" id="divCedula">
                                <label class="form-label small fw-semibold" style="color: #00A693;">Cédula
                                    Profesional</label>
                                <input type="text" class="form-control border-success-subtle" id="cedula"
                                    placeholder="Número de cédula">
                            </div>

                            <!-- ZONA DINÁMICA: Nombre de Laboratorio (Solo visible para Laboratorio) -->
                            <div class="mb-4 d-none" id="divLaboratorio">
                                <label class="form-label small fw-semibold" style="color: #00A693;">Nombre del
                                    Laboratorio</label>
                                <input type="text" class="form-control border-success-subtle" id="nombreLab"
                                    placeholder="Razón social o nombre comercial">
                            </div>

                            <button type="submit" class="btn btn-brand w-100 py-2 rounded-3 shadow-sm mt-2">
                                Completar Registro
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small">¿Ya tienes cuenta? <a href="index.html"
                                    class="text-decoration-none fw-semibold" style="color: #004D7F;">Inicia Sesión</a>
                            </p>
                        </div>

                        <div id="registroAlert" class="alert mt-3 d-none text-center rounded-3 small" role="alert">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Lógica para cambiar dinámicamente los campos según el rol seleccionado
        const tabDoctor = document.getElementById('tab-doctor');
        const tabLaboratorio = document.getElementById('tab-laboratorio');
        const divCedula = document.getElementById('divCedula');
        const divLaboratorio = document.getElementById('divLaboratorio');
        const rolInput = document.getElementById('rolInput');

        function cambiarRol(rol) {
            rolInput.value = rol;
            if (rol === 'doctor') {
                tabDoctor.classList.add('active');
                tabLaboratorio.classList.remove('active');
                divCedula.classList.remove('d-none');
                divLaboratorio.classList.add('d-none');
            } else {
                tabLaboratorio.classList.add('active');
                tabDoctor.classList.remove('active');
                divLaboratorio.classList.remove('d-none');
                divCedula.classList.add('d-none');
            }
        }

        tabDoctor.addEventListener('click', () => cambiarRol('doctor'));
        tabLaboratorio.addEventListener('click', () => cambiarRol('laboratorio'));
    </script>
    <script src="js/api.js"></script>
    <script src="js/registro.js"></script>
</body>

</html>
